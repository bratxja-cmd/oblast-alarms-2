<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Повітряні тривоги по областях</title>
<style>
  :root{
    --ink:#1c1a17;--paper:#f4efe6;--panel:#fbf9f3;--line:#dad1c1;--muted:#7c7264;
    --accent:#b8401f;--s0:#ece8dd;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:"Georgia",serif;line-height:1.5;padding:32px 20px 64px}
  .wrap{max-width:1080px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:18px}
  .eyebrow{font-family:"Courier New",monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  h1{font-size:clamp(26px,4.5vw,42px);line-height:1.05;font-weight:400;letter-spacing:-.01em}
  h1 em{font-style:italic;color:var(--accent)}
  .meta{font-family:"Courier New",monospace;font-size:12px;color:var(--muted);margin-top:12px;display:flex;gap:18px;flex-wrap:wrap}
  .toggle{display:inline-flex;border:1.5px solid var(--ink);border-radius:2px;overflow:hidden;margin:24px 0}
  .toggle button{font-family:"Courier New",monospace;font-size:13px;background:transparent;color:var(--ink);border:none;padding:9px 18px;cursor:pointer}
  .toggle button.active{background:var(--ink);color:var(--paper)}
  .panel-title{font-family:"Courier New",monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:8px 0 16px;display:flex;justify-content:space-between;align-items:baseline}
  .bars{display:flex;flex-direction:column;gap:6px}
  /* ── ЗМІНА 1: ширша колонка назви + перенос у два рядки замість обрізання ── */
  .bar-row{display:grid;grid-template-columns:250px 1fr auto;gap:10px;align-items:center;font-size:14px;cursor:pointer;padding:3px 4px;border-radius:3px}
  .bar-row:hover{background:var(--panel)}
  .bar-row.sel{background:var(--panel);outline:1px solid var(--line)}
  .bar-row .name{text-align:right;line-height:1.2;overflow-wrap:anywhere;hyphens:auto}
  .bar-track{height:18px;background:var(--s0);border-radius:1px}
  .bar-fill{height:100%;background:var(--accent);border-radius:1px;transition:width .4s}
  .bar-val{font-family:"Courier New",monospace;font-size:12px;color:var(--muted);min-width:60px;white-space:nowrap}
  @media(max-width:520px){.bar-row{grid-template-columns:150px 1fr auto}.bar-row .name{font-size:12px}}
  .detail{margin-top:34px;border-top:1px solid var(--line);padding-top:24px}
  .detail h2{font-size:24px;font-weight:400;margin-bottom:4px}
  .detail .sub{font-family:"Courier New",monospace;font-size:12px;color:var(--muted);margin-bottom:20px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:26px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:12px 14px}
  .card .k{font-family:"Courier New",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .card .v{font-size:24px;margin-top:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:30px}
  @media(max-width:680px){.grid2{grid-template-columns:1fr}}
  .months{display:flex;align-items:flex-end;gap:10px;height:160px;padding-top:10px}
  .mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
  .mbar-wrap{flex:1;display:flex;align-items:flex-end;width:100%}
  .mbar{width:100%;background:var(--accent);border-radius:2px 2px 0 0;min-height:2px;transition:height .4s}
  .mlabel{font-family:"Courier New",monospace;font-size:11px;color:var(--muted)}
  .mval{font-family:"Courier New",monospace;font-size:11px}
  .types{display:flex;flex-direction:column;gap:10px}
  .trow{display:grid;grid-template-columns:130px 1fr auto;gap:10px;align-items:center;font-size:13px}
  .ttrack{height:14px;background:var(--s0);border-radius:1px}
  .tfill{height:100%;border-radius:1px}
  footer{margin-top:40px;border-top:1px solid var(--line);padding-top:16px;font-family:"Courier New",monospace;font-size:11px;color:var(--muted);line-height:1.7}
  .tip{position:fixed;pointer-events:none;background:var(--ink);color:var(--paper);font-family:"Courier New",monospace;font-size:11px;padding:6px 9px;border-radius:3px;opacity:0;transition:opacity .1s;z-index:9}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Повітряні тривоги · області · останній місяць +</div>
    <h1>Що пережили <em>області</em></h1>
    <div class="meta">
      <span id="m-src">джерело: —</span>
      <span id="m-upd">оновлено: —</span>
      <span id="m-cnt">областей: —</span>
    </div>
  </header>

  <div class="toggle">
    <button id="t-dur" class="active" onclick="setMetric('dur')">Сумарна тривалість</button>
    <button id="t-cnt" onclick="setMetric('cnt')">Кількість тривог</button>
  </div>

  <div class="panel-title"><span>Рейтинг областей · натисніть для деталей</span><span id="rank-unit">години</span></div>
  <div class="bars" id="bars"></div>

  <div class="detail" id="detail" style="display:none">
    <h2 id="d-name"></h2>
    <div class="sub" id="d-sub"></div>
    <div class="cards" id="d-cards"></div>
    <div id="d-months"></div>
    <div id="d-levels"></div>
  </div>

  <footer>
    <div id="f-note"></div>
    <div>Дані: alerts.in.ua API. Збираються щодня, накопичуються вперед.</div>
  </footer>
</div>
<div class="tip" id="tip"></div>

<script>
const TYPE_COLORS={"Повітряна тривога":"#c8442a","Артобстріл":"#d98a1f","Вуличні бої":"#6e6a5e","Хімічна загроза":"#7a9a3d","Ядерна загроза":"#8a4fb0","unknown":"#9a8f7d"};
const MONTH_NAMES={"01":"січ","02":"лют","03":"бер","04":"кві","05":"тра","06":"чер","07":"лип","08":"сер","09":"вер","10":"жов","11":"лис","12":"гру"};
let DATA=null,METRIC="dur",SEL=null;
const val=r=>METRIC==="dur"?r.total_hours:r.count;
const unit=()=>METRIC==="dur"?"години":"тривог";

// Читає значення метрики з елемента by_month незалежно від формату (число, {total_hours,count}, {hours,count})
function monthMetric(v){
  if(typeof v==="number") return v;               // by_month може бути просто числом
  if(v==null) return 0;
  if(METRIC==="dur") return v.total_hours ?? v.hours ?? v.dur ?? 0;
  return v.count ?? v.n ?? 0;
}
// Форматує підпис місяця з ключа "2026-06" → "чер"
function monthLabel(key){
  const m=String(key).slice(5,7);
  return MONTH_NAMES[m]||key;
}

function render(){
  const regions=[...DATA.regions].sort((a,b)=>val(b)-val(a));
  const max=Math.max(...regions.map(val),1);
  document.getElementById("rank-unit").textContent=unit();
  const bars=document.getElementById("bars");bars.innerHTML="";
  regions.forEach(r=>{
    const v=val(r),row=document.createElement("div");
    row.className="bar-row"+(SEL===r.uid?" sel":"");
    row.onclick=()=>{SEL=r.uid;render();showDetail(r);};
    row.innerHTML=`<div class="name" title="${r.name}">${r.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(v/max*100).toFixed(1)}%"></div></div>
      <div class="bar-val">${METRIC==="dur"?v.toFixed(0)+" год":v}</div>`;
    bars.appendChild(row);
  });
  if(SEL){const r=regions.find(x=>x.uid===SEL);if(r)showDetail(r);}
}

// ── ЗМІНА 2: рендер помісячного графіка (стовпчики) для області ──
function renderMonths(r){
  const wrap=document.getElementById("d-months");wrap.innerHTML="";
  const bm=r.by_month;
  if(!bm) return;
  // Підтримка двох форматів: об'єкт {"2026-05":..., "2026-06":...} або масив [{month:"2026-05",...}]
  let entries;
  if(Array.isArray(bm)){
    entries=bm.map(x=>[x.month??x.key??x.m, x]);
  }else{
    entries=Object.entries(bm);
  }
  entries=entries.filter(e=>e[0]!=null).sort((a,b)=>String(a[0]).localeCompare(String(b[0])));
  if(!entries.length) return;
  const vals=entries.map(e=>monthMetric(e[1]));
  const max=Math.max(...vals,1);
  const sec=document.createElement("div");sec.style.marginBottom="26px";
  sec.innerHTML=`<div class="panel-title"><span>За місяцями</span><span>${unit()}</span></div>`;
  const chart=document.createElement("div");chart.className="months";
  entries.forEach((e,i)=>{
    const v=vals[i];
    const col=document.createElement("div");col.className="mcol";
    col.innerHTML=`<div class="mval">${METRIC==="dur"?v.toFixed(0):v}</div>
      <div class="mbar-wrap"><div class="mbar" style="height:${(v/max*100).toFixed(1)}%"></div></div>
      <div class="mlabel">${monthLabel(e[0])}</div>`;
    chart.appendChild(col);
  });
  sec.appendChild(chart);wrap.appendChild(sec);
}

function renderMonths(r){
  const wrap=document.getElementById("d-months");wrap.innerHTML="";
  const entries=Object.entries(r.by_month||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!entries.length)return;
  const pick=o=>METRIC==="dur"?o.hours:o.count;
  const max=Math.max(...entries.map(([,o])=>pick(o)),1);
  const sec=document.createElement("div");sec.style.marginBottom="26px";
  sec.innerHTML=`<div class="panel-title"><span>За місяцями</span><span>${unit()}</span></div>`;
  const chart=document.createElement("div");chart.className="months";
  entries.forEach(([key,o])=>{
    const v=pick(o);
    const col=document.createElement("div");col.className="mcol";
    col.innerHTML=`<div class="mval">${METRIC==="dur"?v.toFixed(0):v}</div>
      <div class="mbar-wrap"><div class="mbar" style="height:${(v/max*100).toFixed(1)}%"></div></div>
      <div class="mlabel">${o.label} ${key.slice(0,4)}</div>`;
    chart.appendChild(col);
  });
  sec.appendChild(chart);wrap.appendChild(sec);
}

function showDetail(r){
  const d=document.getElementById("detail");d.style.display="block";
  document.getElementById("d-name").textContent=r.name;
  document.getElementById("d-sub").textContent=`${r.oblast} · подій (сума по районах): ${r.count}`;
  document.getElementById("d-cards").innerHTML=`
    <div class="card"><div class="k">Усього тривог</div><div class="v">${r.count}</div></div>
    <div class="card"><div class="k">Сумарно годин</div><div class="v">${r.total_hours.toFixed(0)}</div></div>
    <div class="card"><div class="k">Середня, хв</div><div class="v">${r.avg_minutes.toFixed(0)}</div></div>`;

  renderMonths(r);

  renderMonths(r);

  // Розбивка за рівнями (райони / громади / міста)
  const lw=document.getElementById("d-levels");lw.innerHTML="";
  const levels=r.levels||{};
  const order=["Райони","Громади","Міста","Область","Інше"];
  const keys=Object.keys(levels).sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  if(!keys.length){lw.innerHTML="<div style='color:var(--muted)'>Немає деталізації за рівнями.</div>";}
  keys.forEach(lvl=>{
    const locs=levels[lvl];if(!locs||!locs.length)return;
    const max=Math.max(...locs.map(l=>METRIC==="dur"?l.total_hours:l.count),1);
    const sec=document.createElement("div");sec.style.marginBottom="22px";
    sec.innerHTML=`<div class="panel-title"><span>${lvl} · ${locs.length}</span><span>${unit()}</span></div>`;
    const box=document.createElement("div");box.className="bars";
    locs.forEach(l=>{
      const v=METRIC==="dur"?l.total_hours:l.count;
      const row=document.createElement("div");row.className="bar-row";row.style.cursor="default";
      row.innerHTML=`<div class="name" title="${l.title}">${l.title}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(v/max*100).toFixed(1)}%"></div></div>
        <div class="bar-val">${METRIC==="dur"?v.toFixed(0)+" год":v}</div>`;
      box.appendChild(row);
    });
    sec.appendChild(box);lw.appendChild(sec);
  });
  document.getElementById("detail").scrollIntoView({behavior:"smooth",block:"nearest"});
}

function setMetric(m){METRIC=m;
  document.getElementById("t-dur").classList.toggle("active",m==="dur");
  document.getElementById("t-cnt").classList.toggle("active",m==="cnt");
  render();}

fetch("data/stats.json").then(r=>r.json()).then(d=>{
  DATA=d;
  document.getElementById("m-src").textContent="джерело: "+d.source;
  document.getElementById("m-upd").textContent="оновлено: "+new Date(d.generated_at).toLocaleDateString("uk");
  document.getElementById("m-cnt").textContent="областей: "+d.regions.length;
  document.getElementById("f-note").textContent=d.note||"";
  render();
}).catch(()=>{document.getElementById("bars").innerHTML=
  "<div style='color:var(--accent)'>Дані ще не зібрані. Запустіть workflow (collect.py → build_stats.py).</div>";});
</script>
</body>
</html>
